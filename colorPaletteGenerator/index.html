<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Palette Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-aw
    esome/7.0.1/css/all.min.css" 
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKh
    rnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
     crossorigin="anonymous" 
     referrerpolicy="no-referrer"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="generate-btn">
            <i class="fas fa-sync-alt"></i>
            Generate Palette
        </button>


        <div class="palette-container">
            <div class="color-box">
                <div class="color" style="background-color: #a59cb4;"></div>
                <div class="color-info">
                    <span class="hex-value">#a59cb4</span>
                    <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
                </div>
            </div>

             <div class="color-box">
                <div class="color" style="background-color: #d60d4a;"></div>
                <div class="color-info">
                    <span class="hex-value">#d60d4a</span>
                    <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
                </div>
            </div>


             <div class="color-box">
                <div class="color" style="background-color: #e1f5fe;"></div>
                <div class="color-info">
                    <span class="hex-value">#e1f5fe</span>
                    <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
                </div>
            </div>


             <div class="color-box">
                <div class="color" style="background-color: #0aacf7;"></div>
                <div class="color-info">
                    <span class="hex-value">#0aacf7</span>
                    <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
                </div>
            </div>



             <div class="color-box">
                <div class="color" style="background-color: #3898c5;"></div>
                <div class="color-info">
                    <span class="hex-value">#3898c5</span>
                    <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
                </div>
            </div>


             <div class="color-box">
                <div class="color" style="background-color: #26e05e;"></div>
                <div class="color-info">
                    <span class="hex-value">#26e05e</span>
                    <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
                </div>
            </div>


             <div class="color-box">
                <div class="color" style="background-color: #421ad3;"></div>
                <div class="color-info">
                    <span class="hex-value">#421ad3</span>
                    <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
